<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23c6f135'/%3E%3Cstop offset='.5' stop-color='%2327b9a3'/%3E%3Cstop offset='1' stop-color='%230f7a3e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='5' fill='%2311161d'/%3E%3Cpath d='M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5' fill='none' stroke='url(%23g)' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='miter'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body class="boot">

<!-- ===================== INTRO SPLASH ===================== -->
<div class="intro" id="intro" aria-hidden="true">
  <span class="intro-grid"></span>
  <span class="intro-aurora"></span>
  <div class="intro-stage">
    <span class="intro-burst"></span>
    <span class="intro-glow"></span>
    <span class="ring r1"></span>
    <span class="ring r2"></span>
    <span class="ring r3"></span>
    <div class="intro-signals">
      <span class="sig" style="--tx:0px;--ty:-94px;--d:.60s"></span>
      <span class="sig" style="--tx:64px;--ty:-70px;--d:.66s"></span>
      <span class="sig" style="--tx:92px;--ty:-20px;--d:.62s"></span>
      <span class="sig" style="--tx:88px;--ty:40px;--d:.72s"></span>
      <span class="sig" style="--tx:40px;--ty:84px;--d:.78s"></span>
      <span class="sig" style="--tx:-40px;--ty:84px;--d:.74s"></span>
      <span class="sig" style="--tx:-88px;--ty:40px;--d:.70s"></span>
      <span class="sig" style="--tx:-92px;--ty:-20px;--d:.64s"></span>
      <span class="sig" style="--tx:-64px;--ty:-70px;--d:.58s"></span>
    </div>
    <svg class="intro-mark" viewBox="0 0 24 24" fill="none">
      <defs>
        <linearGradient id="introGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c6f135"/><stop offset=".5" stop-color="#27b9a3"/><stop offset="1" stop-color="#0f7a3e"/></linearGradient>
        <filter id="introBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="0.35"/></filter>
      </defs>
      <path id="mPath" pathLength="1" d="M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5" stroke="url(#introGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="miter"/>
      <circle class="comet" r="0.85" fill="#eaffb0" filter="url(#introBlur)">
        <animateMotion dur="0.56s" begin="0.12s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.65 0 0.35 1"><mpath href="#mPath"/></animateMotion>
      </circle>
    </svg>
    <span class="intro-flash"></span>
  </div>
</div>

<!-- ============== custom window controls (frameless) ============== -->
<div class="win-ctrls">
  <button class="wc" id="wcMin" aria-label="Minimize"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><path d="M0 5h10"/></svg></button>
  <button class="wc" id="wcMax" aria-label="Maximize"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg></button>
  <button class="wc close" id="wcClose" aria-label="Close"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M0 0l10 10M10 0L0 10"/></svg></button>
</div>

<!-- ===================== HOME ===================== -->
<div class="home" id="home">
  <div class="drag-strip" data-tauri-drag-region></div>
  <button class="home-resume" id="homeResume" hidden>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    <span>Back to workspace</span><span class="hr-count" id="homeResumeCount"></span>
  </button>
  <div class="home-inner">
    <div class="hero">
      <div class="logo-glow"><svg width="92" height="92" viewBox="0 0 24 24" fill="none" stroke="url(#mGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="miter"><defs><linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c6f135"/><stop offset=".5" stop-color="#27b9a3"/><stop offset="1" stop-color="#0f7a3e"/></linearGradient></defs><path d="M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5"/><path class="mFlow" pathLength="1" d="M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5" stroke="#eaffb0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="miter"/></svg></div>
      <h1>Maestro</h1>
      <p>Spawn &amp; orchestrate fleets of AI agent CLIs — real terminals, real tree-kill.</p>
    </div>

    <button class="card-primary" id="btnNewWorkspace">
      <span class="cp-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span>
      <span class="cp-text"><b>New workspace</b><span>Pick a folder · choose how many agents to spawn</span></span>
      <span class="cp-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>

    <div class="card-row">
      <button class="card" id="btnQuick">
        <span class="c-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6-6-6M12 19h8"/></svg></span>
        <b>Quick terminal</b>
        <span>One shell, right now</span>
      </button>
      <button class="card" id="btnTemplates">
        <span class="c-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></span>
        <b>Templates</b>
        <span>Spawn a saved crew in one click</span>
      </button>
    </div>

    <div class="recents" id="recents" hidden>
      <span class="recents-label">Recent folders</span>
      <div class="recents-list" id="recentsList"></div>
    </div>

    <div class="home-foot"><b>Maestro</b> · M0 · multi-agent · native Windows</div>
  </div>
</div>

<!-- ===================== WORKSPACE ===================== -->
<div class="app" id="app" hidden>
  <header class="topbar" data-tauri-drag-region>
    <button class="tb-home" id="btnHome" aria-label="Home" title="Home (keep agents running)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5M5.5 9.2V20a1 1 0 0 0 1 1H10v-5.5h4V21h3.5a1 1 0 0 0 1-1V9.2"/></svg></button>
    <nav class="tabstrip" id="tabstrip">
      <button class="tab-add" id="tabAdd" aria-label="New workspace"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </nav>
    <div class="spacer" data-tauri-drag-region></div>
    <button class="tb-btn" id="btnNewAgent"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Agent</button>
    <div class="stats" data-tauri-drag-region>
      <span class="stat live"><span class="pip"></span><b id="runCount">0</b> live</span>
      <span class="stat"><b id="agentCount">0</b> total</span>
    </div>
    <span class="clock" id="clock" data-tauri-drag-region>--:--:--</span>
  </header>
  <main class="main" id="workspaces"></main>
  <div class="bcast" id="bcast">
    <span class="bcast-emitter" id="bcastEmitter" title="Broadcast"><span class="be-core"></span></span>
    <span class="bcast-caret">&#10095;</span>
    <input class="bcast-input" id="bcastInput" placeholder="broadcast a command to the whole fleet…" spellcheck="false" autocapitalize="off" autocomplete="off">
    <div class="bcast-targets" id="bcastTargets"></div>
    <span class="bcast-count" id="bcastCount">0 agents</span>
    <button class="bcast-send" id="bcastSend" disabled><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg> Broadcast <kbd>&#9166;</kbd></button>
  </div>
</div>

<!-- ===================== MODAL ===================== -->
<div class="backdrop" id="spawnModal">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Spawn agents">
    <div class="modal-head">
      <span class="t">Spawn agents</span>
      <button class="x" id="mClose" aria-label="Close"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="mDir">Working directory</label>
        <div class="input-row">
          <input class="input" id="mDir" placeholder="e.g. D:\projects\app" spellcheck="false" autocapitalize="off" autocomplete="off">
          <button class="browse" id="mBrowse"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Browse…</button>
        </div>
      </div>
      <div class="field">
        <label>Crew — pick how many of each CLI</label>
        <div class="crew" id="crewGrid"></div>
      </div>
      <div class="field">
        <label for="mCustom">Custom command</label>
        <div class="custom-row">
          <input class="input" id="mCustom" placeholder="e.g. ollama run llama3" spellcheck="false" autocapitalize="off" autocomplete="off">
          <div class="stepper" data-custom-stepper>
            <button type="button" data-dec aria-label="One fewer">−</button>
            <span class="n" data-custom-n>0</span>
            <button type="button" data-inc aria-label="One more">+</button>
          </div>
        </div>
      </div>
      <label class="perm-toggle" for="mSkipPerms">
        <input type="checkbox" id="mSkipPerms">
        <span class="pt-sw"></span>
        <span class="pt-text">
          <b>Skip permission prompts <em>full access</em></b>
          <span>Auto-adds the skip-permission flag for: Claude, Codex, Gemini, Qwen, Aider, Copilot</span>
        </span>
      </label>
      <div class="crew-total">Total: <b id="crewTotal">0</b> agents</div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="mSaveTpl">Save template</button>
      <button class="btn-ghost" id="mCancel">Cancel</button>
      <button class="btn" id="mSpawn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> <span id="mSpawnLabel">Spawn</span></button>
    </div>
  </div>
</div>

<!-- ===================== CONFIRM ===================== -->
<div class="backdrop" id="confirmModal">
  <div class="modal confirm" role="alertdialog" aria-modal="true">
    <div class="modal-head"><span class="t" id="cfTitle">Confirm</span></div>
    <div class="modal-body">
      <p class="cf-msg" id="cfMsg"></p>
      <div class="cf-input-row" id="cfInputRow" hidden>
        <input class="input" id="cfInput" spellcheck="false" autocapitalize="off" autocomplete="off">
      </div>
      <label class="cf-dontask" id="cfDontaskRow" hidden>
        <input type="checkbox" id="cfDontask">
        <span class="cf-box"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.2 5 8.6 9.5 3.6"/></svg></span>
        <span>Don't ask again</span>
      </label>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="cfCancel">Cancel</button>
      <button class="btn danger" id="cfOk">Confirm</button>
    </div>
  </div>
</div>

<!-- ===================== TEMPLATES ===================== -->
<div class="backdrop" id="tplModal">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Templates">
    <div class="modal-head">
      <span class="t">Templates</span>
      <button class="x" id="tplClose" aria-label="Close"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="tpl-list" id="tplList"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="tplCloseBtn">Close</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
