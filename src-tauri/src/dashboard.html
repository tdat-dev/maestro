<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Maestro — Fleet</title>
<style>
  :root{--bg:#090a0c;--s0:#0f1115;--s1:#16181d;--s2:#20232a;--line:#20232a;--line2:#323842;
    --text:#f8fafc;--muted:#94a3b8;--muted2:#64748b;--accent:#c6f135;--ink:#1a2e05;
    --run:#34d399;--idle:#64748b;--err:#f87171}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    padding:16px;max-width:640px;margin:0 auto;-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  h1{font-size:18px;font-style:italic;font-weight:800;letter-spacing:-.01em}
  h1 span{color:var(--accent)}
  .sum{font-size:12.5px;color:var(--muted)}
  .sum b{color:var(--text)}
  .sum .n{color:var(--accent)}
  .list{display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px 12px;
    padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--s1)}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--idle);grid-row:1/span 2}
  .st-active .dot{background:var(--run)}
  .st-needs .dot{background:var(--accent);box-shadow:0 0 0 4px rgba(198,241,53,.18)}
  .st-stopped{opacity:.55}
  .name{font-size:14px;font-weight:650}
  .meta{grid-column:2;font-size:11.5px;color:var(--muted2)}
  .st{grid-column:3;grid-row:1/span 2;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 9px;border-radius:999px;background:var(--s2);color:var(--muted)}
  .st-active .st{background:var(--run);color:#052e16}
  .st-needs .st{background:var(--accent);color:var(--ink)}
  .out{display:none;grid-column:1/-1;margin-top:8px;max-height:44vh;overflow:auto;
    background:var(--s0);border:1px solid var(--line);border-radius:8px;padding:10px 11px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12px;line-height:1.45;
    white-space:pre-wrap;word-break:break-word;color:#cbd5e1}
  .row.open .out{display:block}
  .out .empty-out{color:var(--muted2)}
  .keys{display:none;grid-column:1/-1;gap:6px;margin-top:8px;flex-wrap:wrap}
  .row.open .keys{display:flex}
  .keys button{flex:0 0 auto;min-width:42px;height:36px;padding:0 10px;background:var(--s2);
    border:1px solid var(--line2);border-radius:8px;color:var(--text);font-size:14px;font-weight:600}
  .keys button:active{background:var(--accent);color:var(--ink)}
  .send{display:none;grid-column:1/-1;gap:8px;margin-top:8px}
  .row.open .send{display:flex}
  .send input{flex:1;background:var(--s0);border:1px solid var(--line2);color:var(--text);
    border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit}
  .send button{background:var(--accent);color:var(--ink);border:none;border-radius:8px;
    padding:0 15px;font-weight:700;font-size:13px}
  .empty{color:var(--muted2);text-align:center;padding:48px 0;font-size:13px}
  .foot{margin-top:18px;text-align:center;color:var(--muted2);font-size:11px}
  .off{color:var(--err)}
  .termbtn-full{display:none;grid-column:1/-1;margin-top:8px;width:100%;background:var(--accent);
    color:var(--ink);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700}
  .row.open .termbtn-full{display:block}
  .termbtn-full:active{filter:brightness(.92)}
  /* full web terminal overlay */
  #term{position:fixed;inset:0;z-index:50;background:#0b0d12;display:none;flex-direction:column}
  #term.on{display:flex}
  .term-head{display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:var(--s1);border-bottom:1px solid var(--line)}
  .term-head b{font-size:14px}
  .term-back{margin-left:auto;background:var(--s2);border:1px solid var(--line2);color:var(--text);
    border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600}
  #termxt{flex:1;min-height:0;padding:6px 8px}
  .xterm{height:100%}
</style>
<link rel="stylesheet" href="/xterm.css">
</head>
<body>
<header><h1>Maestro <span>fleet</span></h1><div class="sum" id="sum"></div></header>
<div class="list" id="list"></div>
<div id="term">
  <div class="term-head"><b id="term-name"></b><button class="term-back" id="term-back">← Fleet</button></div>
  <div id="termxt"></div>
</div>
<div class="foot" id="foot">live</div>
<script>
  const enc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
  let openId = null;

  async function post(paneId, payload) {
    try {
      await fetch("/api/send", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paneId, ...payload }) });
      // Refresh a few times so the key's effect shows fast (the app pushes
      // fresh output ~150ms + ~450ms after delivery).
      for (const d of [200, 500, 900]) setTimeout(tick, d);
    } catch (e) {}
  }
  function send(paneId, input) {
    const message = input.value.trim();
    if (!message) return;
    input.value = "";
    post(paneId, { message });
  }
  // Raw key sequences an interactive TUI (e.g. /resume) needs.
  const KEYS = [
    ["[A", "↑"], ["[B", "↓"], ["\r", "⏎ Enter"],
    ["", "Esc"], ["\t", "Tab"], ["", "^C"],
  ];

  function render(data) {
    const agents = (data && data.agents) || [];
    const output = (data && data.output) || {};
    const list = document.getElementById("list");
    const needs = agents.filter((a) => a.status === "needs").length;
    const active = agents.filter((a) => a.status === "active").length;
    document.getElementById("sum").innerHTML = agents.length
      ? `<b>${agents.length}</b> agents` + (needs ? ` · <span class="n">${needs} need you</span>` : "")
        + (active ? ` · ${active} working` : "")
      : "";
    if (!agents.length) { list.innerHTML = '<div class="empty">No agents running.</div>'; return; }
    // A 2s poll rebuilds this list; capture any in-progress message + focus so
    // typing isn't wiped mid-sentence.
    const ae = document.activeElement;
    const typingId = ae && ae.tagName === "INPUT" ? ae.closest(".row")?.dataset.id : null;
    const draft = typingId != null ? ae.value : null;
    list.innerHTML = agents.map((a) => {
      const open = a.id === openId ? " open" : "";
      const tail = output[a.id];
      const body = tail ? enc(tail) : '<span class="empty-out">No recent output.</span>';
      return `<div class="row st-${enc(a.status)}${open}" data-id="${enc(a.id)}">
        <span class="dot"></span>
        <span class="name">${enc(a.name)}</span>
        <span class="meta">${enc(a.wsName || "")}${a.uptime ? " · " + enc(a.uptime) : ""}</span>
        <span class="st">${enc(a.status)}</span>
        <pre class="out">${body}</pre>
        <button class="termbtn-full" data-term>⛶ Open full terminal — type directly</button>
        <div class="keys">${KEYS.map((k, i) => `<button data-k="${i}">${enc(k[1])}</button>`).join("")}</div>
        <div class="send">
          <input placeholder="Message this agent…" autocomplete="off">
          <button class="send-btn">Send</button>
        </div>
      </div>`;
    }).join("");
    for (const row of list.querySelectorAll(".row")) {
      const id = row.dataset.id;
      const input = row.querySelector("input");
      row.addEventListener("click", (e) => {
        if (e.target.closest(".send") || e.target.closest(".out") || e.target.closest(".keys")) return;
        openId = openId === id ? null : id;
        render(data);
        if (openId === id) {
          const r = list.querySelector(".row.open");
          r?.querySelector("input")?.focus();
          const pre = r?.querySelector(".out");
          if (pre) pre.scrollTop = pre.scrollHeight; // jump to latest
        }
      });
      row.querySelector(".send-btn").addEventListener("click", () => send(id, input));
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(id, input); });
      for (const kb of row.querySelectorAll(".keys button"))
        kb.addEventListener("click", () => post(id, { keys: KEYS[+kb.dataset.k][0] }));
      const nm = (agents.find((a) => a.id === id) || {}).name || id;
      row.querySelector("[data-term]").addEventListener("click", () => openTerm(id, nm));
    }
    // Restore the in-progress message + focus after the rebuild.
    if (typingId != null) {
      for (const row of list.querySelectorAll(".row")) {
        if (row.dataset.id !== typingId) continue;
        const inp = row.querySelector("input");
        if (inp) { inp.value = draft; inp.focus(); inp.setSelectionRange(draft.length, draft.length); }
      }
    }
    // Pin the open agent's output to the latest line as it streams in.
    const openPre = list.querySelector(".row.open .out");
    if (openPre) openPre.scrollTop = openPre.scrollHeight;
  }

  async function tick() {
    try {
      const r = await fetch("/api/fleet");
      render(await r.json());
      document.getElementById("foot").textContent = "live · updated " + new Date().toLocaleTimeString();
      document.getElementById("foot").classList.remove("off");
    } catch (e) {
      document.getElementById("foot").textContent = "disconnected";
      document.getElementById("foot").classList.add("off");
    }
  }
  tick();
  setInterval(tick, 1000);

  /* ---- full web terminal (xterm.js over SSE + input POST) ---- */
  const b64enc = (bytes) => btoa(String.fromCharCode(...bytes));
  const b64dec = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  let term = null, fit = null, es = null, termId = null;

  function openTerm(id, name) {
    termId = id;
    document.getElementById("term-name").textContent = name;
    document.getElementById("term").classList.add("on");
    const host = document.getElementById("termxt");
    host.innerHTML = "";
    term = new Terminal({ fontSize: 13, cursorBlink: true, convertEol: false,
      theme: { background: "#0b0d12", foreground: "#e2e8f0", cursor: "#c6f135" } });
    fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(host);
    // Fit after layout has flushed, else the container measures 0.
    requestAnimationFrame(() => { try { fit.fit(); } catch (e) {} sendResize(); });
    // Keystrokes (incl. arrows/Enter/Ctrl+C as escape sequences) → PTY.
    term.onData((d) => {
      fetch("/term/input", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, data: b64enc(new TextEncoder().encode(d)) }) }).catch(() => {});
    });
    term.onResize(sendResize);
    window.addEventListener("resize", onWinResize);
    // Live output stream.
    es = new EventSource("/term?id=" + encodeURIComponent(id));
    es.onmessage = (e) => { if (term) term.write(b64dec(e.data)); };
    setTimeout(() => term && term.focus(), 60);
  }
  function sendResize() {
    if (!term || !termId) return;
    fetch("/term/resize", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: termId, cols: term.cols, rows: term.rows }) }).catch(() => {});
  }
  function onWinResize() { if (fit) { try { fit.fit(); } catch (e) {} } }
  function closeTerm() {
    if (es) { es.close(); es = null; }
    window.removeEventListener("resize", onWinResize);
    if (term) { term.dispose(); term = null; }
    fit = null; termId = null;
    document.getElementById("term").classList.remove("on");
  }
  document.getElementById("term-back").addEventListener("click", closeTerm);
</script>
<script src="/xterm.js"></script>
<script src="/addon-fit.js"></script>
</body>
</html>
