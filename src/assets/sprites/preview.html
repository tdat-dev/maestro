<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Maestro mascot sprites</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;background:#15171c;color:#e6e8ee;
    font:14px/1.4 system-ui,Segoe UI,sans-serif;padding:28px}
  h1{font-size:18px;font-weight:600;margin:0 0 4px}
  p.sub{margin:0 0 24px;color:#8a90a0}
  .grid{display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .card{margin:0;background:#1e2128;border:1px solid #2b2f3a;border-radius:12px;
    padding:14px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .stage{height:200px;width:100%;display:flex;align-items:flex-end;
    justify-content:center;
    background:
      linear-gradient(45deg,#272b34 25%,transparent 25%,transparent 75%,#272b34 75%) 0 0/16px 16px,
      linear-gradient(45deg,#272b34 25%,#1e2128 25%,#1e2128 75%,#272b34 75%) 8px 8px/16px 16px;
    border-radius:8px;overflow:hidden}
  .spr{image-rendering:pixelated;background-repeat:no-repeat;transform-origin:bottom center}
  figcaption{font-weight:600;text-align:center;display:flex;flex-direction:column}
  figcaption span{font-weight:400;color:#8a90a0;font-size:12px}
  @keyframes kf-idle{from{background-position-x:0}to{background-position-x:-316px}}@keyframes kf-pet_idle{from{background-position-x:0}to{background-position-x:-272px}}@keyframes kf-walk{from{background-position-x:0}to{background-position-x:-324px}}@keyframes kf-pet_walk{from{background-position-x:0}to{background-position-x:-452px}}@keyframes kf-run{from{background-position-x:0}to{background-position-x:-380px}}@keyframes kf-pet_run{from{background-position-x:0}to{background-position-x:-452px}}@keyframes kf-jump{from{background-position-x:0}to{background-position-x:-340px}}@keyframes kf-pet_jump{from{background-position-x:0}to{background-position-x:-320px}}@keyframes kf-wave{from{background-position-x:0}to{background-position-x:-336px}}@keyframes kf-pet_cheer{from{background-position-x:0}to{background-position-x:-280px}}@keyframes kf-attack{from{background-position-x:0}to{background-position-x:-664px}}@keyframes kf-pet_attack{from{background-position-x:0}to{background-position-x:-201px}}@keyframes kf-sit_pet{from{background-position-x:0}to{background-position-x:-692px}}@keyframes kf-celebrate{from{background-position-x:0}to{background-position-x:-410px}}@keyframes kf-pet_cheer_b{from{background-position-x:0}to{background-position-x:-225px}}
</style></head>
<body>
  <h1>Maestro mascot — pixel sprites</h1>
  <p class="sub">15 animations sliced from the reference sheet · CSS steps() preview · scaled 3×</p>
  <div class="grid">
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:79px;height:144px;background-image:url('idle.png');
        animation:kf-idle 0.667s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>idle<span>4f · 6fps · 79×144</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:68px;height:101px;background-image:url('pet_idle.png');
        animation:kf-pet_idle 0.667s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_idle<span>4f · 6fps · 68×101</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:81px;height:146px;background-image:url('walk.png');
        animation:kf-walk 0.5s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>walk<span>4f · 8fps · 81×146</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:113px;height:95px;background-image:url('pet_walk.png');
        animation:kf-pet_walk 0.5s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_walk<span>4f · 8fps · 113×95</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:95px;height:142px;background-image:url('run.png');
        animation:kf-run 0.333s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>run<span>4f · 12fps · 95×142</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:113px;height:93px;background-image:url('pet_run.png');
        animation:kf-pet_run 0.333s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_run<span>4f · 12fps · 113×93</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:85px;height:158px;background-image:url('jump.png');
        animation:kf-jump 0.4s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>jump<span>4f · 10fps · 85×158</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:80px;height:122px;background-image:url('pet_jump.png');
        animation:kf-pet_jump 0.4s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_jump<span>4f · 10fps · 80×122</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:84px;height:149px;background-image:url('wave.png');
        animation:kf-wave 0.571s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>wave<span>4f · 7fps · 84×149</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:70px;height:103px;background-image:url('pet_cheer.png');
        animation:kf-pet_cheer 0.5s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_cheer<span>4f · 8fps · 70×103</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:166px;height:153px;background-image:url('attack.png');
        animation:kf-attack 0.4s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>attack<span>4f · 10fps · 166×153</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:67px;height:118px;background-image:url('pet_attack.png');
        animation:kf-pet_attack 0.3s steps(3) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_attack<span>3f · 10fps · 67×118</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:173px;height:146px;background-image:url('sit_pet.png');
        animation:kf-sit_pet 1.0s steps(4) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>sit_pet<span>4f · 4fps · 173×146</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:82px;height:129px;background-image:url('celebrate.png');
        animation:kf-celebrate 0.556s steps(5) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>celebrate<span>5f · 9fps · 82×129</span></figcaption>
  </figure>
  <figure class="card">
    <div class="stage">
      <div class="spr" style="width:75px;height:123px;background-image:url('pet_cheer_b.png');
        animation:kf-pet_cheer_b 0.375s steps(3) infinite;transform:scale(3);"></div>
    </div>
    <figcaption>pet_cheer_b<span>3f · 8fps · 75×123</span></figcaption>
  </figure>
  </div>
</body></html>
