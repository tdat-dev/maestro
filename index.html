<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23c6f135'/%3E%3Cstop offset='.5' stop-color='%2327b9a3'/%3E%3Cstop offset='1' stop-color='%230f7a3e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='5' fill='%2311161d'/%3E%3Cpath d='M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5' fill='none' stroke='url(%23g)' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='miter'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1014; --surface-0:#11161d; --surface-1:#161b22; --surface-2:#1c232c; --surface-3:#232b35;
  --line:#2a323d; --line-strong:#3a4552;
  --text:#e8edf2; --text-2:#c2ccd6; --muted:#94a3b1; --muted-2:#7d8b99;
  --accent:#c6f135; --accent-dim:#9bbd2a; --accent-ink:#10160a; --accent-glow:rgba(198,241,53,.16);
  --info:#5ec2f0; --run:#3ad29f; --idle:#6b7785; --err:#ff6b6b;
  --r2:6px; --r3:8px;
  --mono:'IBM Plex Mono', ui-monospace, monospace;
  --display:'Bricolage Grotesque', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow:hidden}
/* ===== frameless custom title bar ===== */
.win-ctrls{position:fixed;top:0;right:0;z-index:300;display:flex;height:38px}
.wc{position:relative;width:46px;height:38px;display:grid;place-items:center;color:var(--muted-2);background:transparent;overflow:hidden;transition:color .15s ease}
.wc::before{content:"";position:absolute;inset:0;background:rgba(255,255,255,.10);opacity:0;transition:opacity .16s ease}
.wc:hover{color:var(--text)}
.wc:hover::before{opacity:1}
.wc:active::before{opacity:.55}
.wc.close::before{background:#e3402f}
.wc.close:hover{color:#fff}
.wc svg{position:relative;width:10px;height:10px;display:block;transition:transform .15s cubic-bezier(.2,.7,.2,1)}
.wc:hover svg{transform:scale(1.14)}
.wc:active svg{transform:scale(.88)}
.drag-strip{position:fixed;top:0;left:0;right:0;height:38px;z-index:250}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
svg{display:block;flex:none}
[hidden]{display:none !important}
:focus-visible{outline:none;box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent);border-radius:var(--r2)}
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:6px;border:2px solid transparent;background-clip:padding-box}

/* ========================= HOME / LAUNCHER ========================= */
.home{position:fixed;inset:0;overflow:auto;display:grid;place-items:center;
  background:
    radial-gradient(820px 440px at 50% 20%, rgba(198,241,53,.10), transparent 62%),
    radial-gradient(560px 560px at 86% 96%, rgba(94,194,240,.05), transparent 60%),
    var(--bg);}
.home-inner{width:min(660px,92vw);padding:44px 0 56px;display:flex;flex-direction:column;align-items:stretch}
.hero{text-align:center;margin-bottom:34px}
.logo-glow{width:104px;height:104px;margin:0 auto 16px;display:grid;place-items:center}
.logo-glow svg{filter:drop-shadow(0 0 22px rgba(39,185,163,.45)) drop-shadow(0 0 8px rgba(198,241,53,.3))}
.hero h1{font-family:var(--display);font-style:italic;font-weight:800;font-size:52px;letter-spacing:-.03em;line-height:1}
.hero p{margin:14px auto 0;color:var(--muted);font-size:13.5px;max-width:430px;line-height:1.65}

.card-primary{display:flex;align-items:center;gap:16px;text-align:left;padding:21px 22px;border-radius:14px;
  background:linear-gradient(180deg,rgba(198,241,53,.07),rgba(255,255,255,.012));
  border:1px solid var(--accent-dim);box-shadow:0 0 0 4px var(--accent-glow),0 16px 44px rgba(0,0,0,.45);
  transition:box-shadow .18s ease,border-color .18s ease}
.card-primary:hover{box-shadow:0 0 0 5px var(--accent-glow),0 20px 56px rgba(0,0,0,.55);border-color:var(--accent)}
.cp-ic{width:46px;height:46px;border-radius:12px;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;flex:none}
.cp-text{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.cp-text b{font-size:17px;font-weight:700}
.cp-text span{font-size:12.5px;color:var(--muted)}
.cp-arrow{color:var(--accent);flex:none}

.card-row{display:flex;gap:13px;margin-top:13px}
.card{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:5px;text-align:left;padding:17px 17px 16px;border-radius:12px;
  background:var(--surface-1);border:1px solid var(--line);transition:border-color .18s ease,background .18s ease}
.card:not(.disabled):hover{border-color:var(--line-strong);background:var(--surface-2)}
.card.disabled{opacity:.55;cursor:default}
.card .c-ic{width:34px;height:34px;border-radius:9px;background:var(--surface-3);color:var(--text-2);display:grid;place-items:center;margin-bottom:5px}
.card b{font-size:13.5px;font-weight:600}
.card b em{font-style:normal;font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent-dim);border:1px solid var(--accent-dim);border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:middle}
.card>span{font-size:11.5px;color:var(--muted)}

.recents{margin-top:26px;display:flex;flex-direction:column;gap:10px}
.recents-label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
.recents-list{display:flex;flex-wrap:wrap;gap:8px}
.recent-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;background:var(--surface-1);border:1px solid var(--line);color:var(--text-2);font-size:12px;max-width:100%}
.recent-chip:hover{border-color:var(--accent-dim);color:var(--text)}
.recent-chip svg{color:var(--muted-2)}
.recent-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-foot{margin-top:30px;text-align:center;font-size:10.5px;color:var(--muted-2)}
.home-foot b{color:var(--muted)}

/* ========================= WORKSPACE ========================= */
.app{display:grid;grid-template-rows:50px 40px 1fr;height:100vh;width:100vw}
.topbar{display:flex;align-items:center;gap:14px;padding:0 150px 0 16px;background:linear-gradient(180deg,#121821,#0f141b);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(0,0,0,.4)}
.brand{display:flex;align-items:center;gap:9px;cursor:pointer}
.brand .mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:grid;place-items:center;color:var(--accent-ink);box-shadow:0 0 0 1px rgba(198,241,53,.3),0 4px 14px rgba(198,241,53,.18)}
.wordmark{font-family:var(--display);font-weight:800;font-style:italic;font-size:19px;letter-spacing:-.02em}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r2);border:1px solid var(--accent-dim);background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:12.5px;transition:background .15s,box-shadow .15s;box-shadow:0 0 0 0 var(--accent-glow)}
.tb-btn:hover{background:#d3fc4d;box-shadow:0 0 0 4px var(--accent-glow)}
.spacer{flex:1}
/* live stats cluster */
.stats{display:flex;align-items:center;gap:14px}
.stat{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.stat b{color:var(--text);font-weight:700}
.stat.live b{color:var(--run)}
.stat .pip{width:7px;height:7px;border-radius:50%;background:var(--idle)}
.stat.live .pip{background:var(--run);box-shadow:0 0 0 0 rgba(58,210,159,.5);animation:pulse 2.2s infinite}
.clock{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;border-left:1px solid var(--line);padding-left:14px}
/* tab strip — one tab per workspace */
.tabstrip{display:flex;align-items:flex-end;gap:5px;padding:6px 10px 0;background:#0e131a;border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden}
.tabstrip::-webkit-scrollbar{height:0}
.tab{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 7px 0 11px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;color:var(--muted);background:transparent;font-size:12px;font-weight:600;white-space:nowrap;flex:none;cursor:pointer;transition:background .14s,color .14s}
.tab:hover{background:var(--surface-1);color:var(--text-2)}
.tab.active{background:var(--surface-2);color:var(--text);border-color:var(--line)}
.tab .tdot{width:7px;height:7px;border-radius:50%;background:var(--idle);flex:none}
.tab.live .tdot{background:var(--run);box-shadow:0 0 0 0 rgba(58,210,159,.5);animation:pulse 2.2s infinite}
.tab .tname{max-width:160px;overflow:hidden;text-overflow:ellipsis}
.tab .tcount{font-size:10px;color:var(--muted-2);font-variant-numeric:tabular-nums}
.tab .tclose{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;color:var(--muted-2);margin-left:1px}
.tab .tclose:hover{background:var(--surface-3);color:var(--err)}
.tab-add{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--muted);flex:none}
.tab-add:hover{background:var(--surface-1);color:var(--accent)}
.main{overflow:auto;padding:14px;
  background:
    radial-gradient(760px 340px at 12% -10%, rgba(198,241,53,.055), transparent 60%),
    radial-gradient(680px 460px at 100% 112%, rgba(94,194,240,.045), transparent 62%),
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.022) 1px, transparent 0);
  background-size:auto,auto,22px 22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));grid-auto-rows:400px;gap:14px;align-content:start}
.pane{display:flex;flex-direction:column;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;transition:border-color .15s,box-shadow .15s,transform .15s;animation:paneIn .3s cubic-bezier(.2,.7,.2,1) both}
.pane:hover{border-color:var(--line-strong);box-shadow:0 10px 30px rgba(0,0,0,.34);transform:translateY(-1px)}
.pane.run{border-color:rgba(58,210,159,.28)}
.pane.run::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--run),transparent);opacity:.5}
.pane{position:relative}
.pane.err{border-color:rgba(255,107,107,.45)}
.pane-head{display:flex;align-items:center;gap:9px;padding:8px 9px 8px 10px;background:linear-gradient(180deg,var(--surface-2),var(--surface-1));border-bottom:1px solid var(--line);flex:none}
.mono{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:13px;color:#0d1014;background:var(--c,#c6f135);box-shadow:0 0 0 1px rgba(0,0,0,.28),0 3px 10px rgba(0,0,0,.3)}
.pane-id{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pane-name{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pane-sub{font-size:9.5px;color:var(--muted-2);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uptime{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.03em;flex:none}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.run{background:var(--run);box-shadow:0 0 0 0 rgba(58,210,159,.5);animation:pulse 2.2s infinite}
.dot.idle{background:var(--idle)}.dot.err{background:var(--err)}
.status{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;flex:none}
.status.run{color:var(--run)}.status.err{color:var(--err)}
.ctrls{display:flex;gap:2px;flex:none}
.pctrl{width:21px;height:21px;border-radius:5px;display:grid;place-items:center;color:var(--muted-2);transition:background .14s,color .14s}
.pctrl:hover{background:var(--surface-3);color:var(--text)}
.pctrl.danger:hover{background:rgba(255,107,107,.16);color:var(--err)}
.term-host{flex:1;min-height:0;background:var(--surface-0);padding:7px 5px 5px;overflow:hidden}
.term-host .xterm{height:100%}
.tile-spawn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;border:1.5px dashed var(--line-strong);border-radius:var(--r3);color:var(--muted);background:rgba(255,255,255,.008);transition:border-color .18s,color .18s,background .18s,transform .18s}
.tile-spawn:hover{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow);transform:translateY(-1px)}
.tile-spawn .ic{width:44px;height:44px;border-radius:50%;border:1.5px solid currentColor;display:grid;place-items:center}
.tile-spawn .t{font-weight:600;font-size:13px}
.tile-spawn .sub{font-size:10.5px;color:var(--muted-2)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,210,159,.45)}70%{box-shadow:0 0 0 7px rgba(58,210,159,0)}100%{box-shadow:0 0 0 0 rgba(58,210,159,0)}}
@keyframes paneIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.pane{animation:none}.dot.run,.stat.live .pip{animation:none}}

/* ========================= MODAL ========================= */
.backdrop{position:fixed;inset:0;background:rgba(6,9,13,.66);display:none;align-items:center;justify-content:center;z-index:100}
.backdrop.open{display:flex}
.modal{width:460px;max-width:calc(100vw - 32px);max-height:calc(100vh - 40px);display:flex;flex-direction:column;background:var(--surface-1);border:1px solid var(--line-strong);border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden}
.modal-head{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line)}
.modal-head .t{font-family:var(--display);font-style:italic;font-weight:800;font-size:16px}
.modal-head .x{margin-left:auto;width:24px;height:24px;border-radius:5px;display:grid;place-items:center;color:var(--muted)}
.modal-head .x:hover{background:var(--surface-3);color:var(--text)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:15px;overflow-y:auto;min-height:0}
.field{display:flex;flex-direction:column;gap:7px}
.field>label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
.input-row{display:flex;gap:6px}
.input{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r2);padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:12.5px;min-width:0}
.input::placeholder{color:var(--muted-2)}
.input:focus{outline:none;border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow)}
.browse{flex:none;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid var(--line-strong);border-radius:var(--r2);background:var(--surface-3);color:var(--text-2);font-size:12px;font-weight:500}
.browse:hover{border-color:var(--accent-dim);color:var(--text)}
.chips{display:flex;gap:6px;align-items:center}
.chip{flex:1;padding:8px 0;border:1px solid var(--line);border-radius:var(--r2);background:var(--surface-2);color:var(--muted);font-weight:600;font-size:12.5px;font-variant-numeric:tabular-nums}
.chip:hover{border-color:var(--line-strong);color:var(--text-2)}
.chip.on{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent)}
.chips .or{font-size:10px;color:var(--muted-2)}
.crew{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
.crew-card{display:flex;align-items:center;gap:9px;min-width:0;padding:7px 8px 7px 10px;border:1px solid var(--line);border-radius:var(--r2);background:var(--surface-2);transition:border-color .14s,background .14s}
.crew-card:hover{border-color:var(--line-strong)}
.crew-card.on{border-color:var(--accent-dim);background:var(--accent-glow)}
.crew-card .cc-meta{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.crew-card .cc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crew-card.on .cc-name{color:var(--accent)}
.crew-card .cc-badge{font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stepper{display:flex;align-items:center;gap:2px;flex:none}
.stepper button{width:21px;height:21px;border-radius:5px;background:var(--surface-3);color:var(--text-2);display:grid;place-items:center;font-size:15px;line-height:1;transition:background .12s,color .12s}
.stepper button:hover{background:var(--line-strong);color:var(--text)}
.stepper .n{min-width:18px;text-align:center;font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:600}
.crew-card.on .stepper .n{color:var(--accent)}
.crew-total{font-size:11.5px;color:var(--muted);text-align:right}
.crew-total b{color:var(--accent);font-variant-numeric:tabular-nums;font-size:13px}
.custom-row{display:flex;gap:6px;align-items:center}
.custom-row .input{flex:1;min-width:0}
.custom-row .stepper{padding:0 2px}
/* full-access toggle */
.perm-toggle{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r2);background:var(--surface-2);cursor:pointer}
.perm-toggle:hover{border-color:var(--line-strong)}
.perm-toggle input{position:absolute;opacity:0;width:0;height:0}
.perm-toggle .pt-sw{flex:none;width:34px;height:19px;border-radius:19px;background:var(--surface-3);border:1px solid var(--line-strong);position:relative;transition:background .16s,border-color .16s}
.perm-toggle .pt-sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--muted);transition:transform .16s,background .16s}
.perm-toggle input:checked + .pt-sw{background:rgba(255,107,107,.25);border-color:var(--err)}
.perm-toggle input:checked + .pt-sw::after{transform:translateX(15px);background:var(--err)}
.perm-toggle input:focus-visible + .pt-sw{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
.perm-toggle .pt-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.perm-toggle .pt-text b{font-size:12px;font-weight:600}
.perm-toggle .pt-text b em{font-style:normal;font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--err);border:1px solid var(--err);border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.perm-toggle .pt-text span{font-size:10.5px;color:var(--muted-2);line-height:1.3}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:13px 16px;border-top:1px solid var(--line);background:var(--surface-0)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r2);border:1px solid var(--accent-dim);background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:12.5px}
.btn:hover{background:#d3fc4d}
.btn-ghost{padding:8px 15px;border:1px solid var(--line-strong);border-radius:var(--r2);background:transparent;color:var(--text-2);font-size:12.5px;font-weight:500}
.btn-ghost:hover{background:var(--surface-3);color:var(--text)}
</style>
</head>
<body>

<!-- ============== custom window controls (frameless) ============== -->
<div class="win-ctrls">
  <button class="wc" id="wcMin" aria-label="Minimize"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><path d="M0 5h10"/></svg></button>
  <button class="wc" id="wcMax" aria-label="Maximize"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg></button>
  <button class="wc close" id="wcClose" aria-label="Close"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M0 0l10 10M10 0L0 10"/></svg></button>
</div>

<!-- ===================== HOME ===================== -->
<div class="home" id="home">
  <div class="drag-strip" data-tauri-drag-region></div>
  <div class="home-inner">
    <div class="hero">
      <div class="logo-glow"><svg width="92" height="92" viewBox="0 0 24 24" fill="none" stroke="url(#mGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="miter"><defs><linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c6f135"/><stop offset=".5" stop-color="#27b9a3"/><stop offset="1" stop-color="#0f7a3e"/></linearGradient></defs><path d="M4 19.5 6.6 7 10 12.4 12 8.4 14 12.4 17.4 7 20 19.5"/></svg></div>
      <h1>Maestro</h1>
      <p>Spawn &amp; orchestrate fleets of AI agent CLIs — real terminals, real tree-kill.</p>
    </div>

    <button class="card-primary" id="btnNewWorkspace">
      <span class="cp-ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span>
      <span class="cp-text"><b>New workspace</b><span>Pick a folder · choose how many agents to spawn</span></span>
      <span class="cp-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>

    <div class="card-row">
      <button class="card" id="btnQuick">
        <span class="c-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6-6-6M12 19h8"/></svg></span>
        <b>Quick terminal</b>
        <span>One shell, right now</span>
      </button>
      <button class="card disabled" disabled>
        <span class="c-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></span>
        <b>Templates <em>soon</em></b>
        <span>Saved agent crews &amp; workflows</span>
      </button>
    </div>

    <div class="recents" id="recents" hidden>
      <span class="recents-label">Recent folders</span>
      <div class="recents-list" id="recentsList"></div>
    </div>

    <div class="home-foot"><b>Maestro</b> · M0 · multi-agent · native Windows</div>
  </div>
</div>

<!-- ===================== WORKSPACE ===================== -->
<div class="app" id="app" hidden>
  <header class="topbar" data-tauri-drag-region>
    <button class="tb-btn" id="btnNewAgent"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> New agent</button>
    <div class="spacer" data-tauri-drag-region></div>
    <div class="stats" data-tauri-drag-region>
      <span class="stat live"><span class="pip"></span><b id="runCount">0</b> live</span>
      <span class="stat"><b id="agentCount">0</b> agents</span>
    </div>
    <span class="clock" id="clock" data-tauri-drag-region>--:--:--</span>
  </header>
  <nav class="tabstrip" id="tabstrip">
    <button class="tab-add" id="tabAdd" aria-label="New workspace"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
  </nav>
  <main class="main" id="workspaces"></main>
</div>

<!-- ===================== MODAL ===================== -->
<div class="backdrop" id="spawnModal">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Spawn agents">
    <div class="modal-head">
      <span class="t">Spawn agents</span>
      <button class="x" id="mClose" aria-label="Close"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="mDir">Working directory</label>
        <div class="input-row">
          <input class="input" id="mDir" placeholder="e.g. D:\projects\app" spellcheck="false" autocapitalize="off" autocomplete="off">
          <button class="browse" id="mBrowse"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Browse…</button>
        </div>
      </div>
      <div class="field">
        <label>Crew — pick how many of each CLI</label>
        <div class="crew" id="crewGrid"></div>
      </div>
      <div class="field">
        <label for="mCustom">Custom command</label>
        <div class="custom-row">
          <input class="input" id="mCustom" placeholder="e.g. ollama run llama3" spellcheck="false" autocapitalize="off" autocomplete="off">
          <div class="stepper" data-custom-stepper>
            <button type="button" data-dec aria-label="One fewer">−</button>
            <span class="n" data-custom-n>0</span>
            <button type="button" data-inc aria-label="One more">+</button>
          </div>
        </div>
      </div>
      <label class="perm-toggle" for="mSkipPerms">
        <input type="checkbox" id="mSkipPerms">
        <span class="pt-sw"></span>
        <span class="pt-text">
          <b>Skip permission prompts <em>full access</em></b>
          <span>Auto-adds the skip-permission flag for: Claude, Codex, Gemini, Qwen, Aider, Copilot</span>
        </span>
      </label>
      <div class="crew-total">Total: <b id="crewTotal">0</b> agents</div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="mCancel">Cancel</button>
      <button class="btn" id="mSpawn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> <span id="mSpawnLabel">Spawn</span></button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
